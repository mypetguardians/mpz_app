name: Deploy

on:
  push:
    branches:
      - main   # prod 배포
      - dev    # dev 배포

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment variables
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "APP_ENV=prod" >> $GITHUB_ENV
            echo "EC2_HOST=${{ secrets.PROD_EC2_HOST }}" >> $GITHUB_ENV
          else
            echo "APP_ENV=dev" >> $GITHUB_ENV
            echo "EC2_HOST=${{ secrets.DEV_EC2_HOST }}" >> $GITHUB_ENV
          fi
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_PREFIX=ghcr.io/${OWNER}/mpz" >> $GITHUB_ENV
          echo "TAG=${{ github.ref_name }}-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── FE 빌드용 환경변수 준비 ──
      - name: Prepare FE build args
        run: |
          if [ "${{ env.APP_ENV }}" = "prod" ]; then
            echo "NEXT_PUBLIC_API_BASE_URL=https://api.mpz.kr/v1/" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_KAKAO_REDIRECT_URI=https://api.mpz.kr/v1/kakao/login/callback" >> $GITHUB_ENV
          else
            echo "NEXT_PUBLIC_API_BASE_URL=https://dev-api.mpz.kr/v1/" >> $GITHUB_ENV
            echo "NEXT_PUBLIC_KAKAO_REDIRECT_URI=https://dev-api.mpz.kr/v1/kakao/login/callback" >> $GITHUB_ENV
          fi
          echo "NEXT_PUBLIC_KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }}" >> $GITHUB_ENV
          # Firebase (dev/prod 동일 프로젝트)
          echo "NEXT_PUBLIC_FIREBASE_API_KEY=AIzaSyDMPEJwSDwlV7st46yAZzxLFKp1b2qMfrY" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=mypetguardians-a8ad3.firebaseapp.com" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_FIREBASE_PROJECT_ID=mypetguardians-a8ad3" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=mypetguardians-a8ad3.firebasestorage.app" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=273159148866" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_FIREBASE_APP_ID=1:273159148866:web:ccd09e378ab7cf15eee4db" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_FIREBASE_VAPID_KEY=BPmzNRJ7LXtpCF75MJ8PyvQ8AHIWCBck33GoWmuvIJijGLDv6mgccdS5HZQ7160FtiYh7K9CxvxAfBE6PBG-VA8" >> $GITHUB_ENV

      # ── Frontend 이미지 빌드 + push ──
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-frontend:${{ env.TAG }}
            ${{ env.IMAGE_PREFIX }}-frontend:${{ github.ref_name }}-latest
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ env.NEXT_PUBLIC_API_BASE_URL }}
            NEXT_PUBLIC_KAKAO_CLIENT_ID=${{ env.NEXT_PUBLIC_KAKAO_CLIENT_ID }}
            NEXT_PUBLIC_KAKAO_REDIRECT_URI=${{ env.NEXT_PUBLIC_KAKAO_REDIRECT_URI }}
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ env.NEXT_PUBLIC_FIREBASE_API_KEY }}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ env.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ env.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ env.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ env.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
            NEXT_PUBLIC_FIREBASE_APP_ID=${{ env.NEXT_PUBLIC_FIREBASE_APP_ID }}
            NEXT_PUBLIC_FIREBASE_VAPID_KEY=${{ env.NEXT_PUBLIC_FIREBASE_VAPID_KEY }}
            CACHE_BUST=${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Backend 이미지 빌드 + push ──
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-backend:${{ env.TAG }}
            ${{ env.IMAGE_PREFIX }}-backend:${{ github.ref_name }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment variables
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "APP_ENV=prod" >> $GITHUB_ENV
            echo "EC2_HOST=${{ secrets.PROD_EC2_HOST }}" >> $GITHUB_ENV
          else
            echo "APP_ENV=dev" >> $GITHUB_ENV
            echo "EC2_HOST=${{ secrets.DEV_EC2_HOST }}" >> $GITHUB_ENV
          fi
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_PREFIX=ghcr.io/${OWNER}/mpz" >> $GITHUB_ENV
          echo "TAG=${{ github.ref_name }}-latest" >> $GITHUB_ENV

      # BE 환경변수 파일을 SCP로 EC2에 전송
      - name: Upload BE env file
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          BE_ENV_CONTENT: ${{ github.ref_name == 'main' && secrets.BE_ENV_PROD || secrets.BE_ENV_DEV }}
        run: |
          echo "$SSH_KEY" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key
          printenv BE_ENV_CONTENT > /tmp/be_env
          scp -o StrictHostKeyChecking=no -i /tmp/ssh_key /tmp/be_env ubuntu@${{ env.EC2_HOST }}:~/mpz_app/backend/.env.${{ env.APP_ENV }}
          rm -f /tmp/ssh_key /tmp/be_env

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        with:
          host: ${{ env.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: APP_ENV,TAG,GHCR_TOKEN,GHCR_USER
          command_timeout: 10m
          script: |
            cd ~/mpz_app

            # 최신 코드 pull (compose 파일, nginx 설정 등)
            git fetch origin ${{ github.ref_name }} && git reset --hard origin/${{ github.ref_name }}

            # GHCR 로그인
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # 이미지 pull (빌드 없음!)
            OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
            docker pull ghcr.io/${OWNER}/mpz-frontend:$TAG
            docker pull ghcr.io/${OWNER}/mpz-backend:$TAG

            # 이미지 태그를 compose에서 사용할 이름으로 변환
            docker tag ghcr.io/${OWNER}/mpz-frontend:$TAG mpz_app-frontend:latest
            docker tag ghcr.io/${OWNER}/mpz-backend:$TAG mpz_app-backend:latest

            # 컨테이너 교체 (빌드 없이 pull된 이미지 사용)
            APP_ENV=$APP_ENV docker compose -f docker-compose.prod.yml up -d --no-build --force-recreate frontend backend nginx redis

            # worker 최초 생성만
            APP_ENV=$APP_ENV docker compose -f docker-compose.prod.yml up -d --no-build --no-recreate worker

            # backend 준비 대기 후 마이그레이션
            until APP_ENV=$APP_ENV docker compose -f docker-compose.prod.yml exec -T backend python -c "import django" 2>/dev/null; do
              sleep 2
            done
            APP_ENV=$APP_ENV docker compose -f docker-compose.prod.yml exec -T backend python manage.py migrate --noinput
            APP_ENV=$APP_ENV docker compose -f docker-compose.prod.yml exec -T backend python manage.py collectstatic --noinput

            # 오래된 이미지 정리
            docker image prune -f

            echo "✅ Deploy complete: $APP_ENV"
