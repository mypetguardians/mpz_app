name: Deploy

on:
  push:
    branches:
      - main   # prod 배포
      - dev    # dev 배포

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment variables
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "EC2_HOST=${{ secrets.PROD_EC2_HOST }}" >> $GITHUB_ENV
            echo "APP_ENV=prod" >> $GITHUB_ENV
          else
            echo "EC2_HOST=${{ secrets.DEV_EC2_HOST }}" >> $GITHUB_ENV
            echo "APP_ENV=dev" >> $GITHUB_ENV
          fi

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "."
          target: "~/mpz_app"
          rm: false

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: APP_ENV
          command_timeout: 20m
          script: |
            cd ~/mpz_app

            # .env 생성 (NEXT_PUBLIC_* 빌드 변수 + CACHE_BUST)
            echo "APP_ENV=$APP_ENV" > .env
            echo "CACHE_BUST=$(date +%s)" >> .env
            grep '^NEXT_PUBLIC_' backend/.env.$APP_ENV >> .env || true
            if ! grep -q 'NEXT_PUBLIC_KAKAO_CLIENT_ID' .env; then
              KAKAO_ID=$(grep '^KAKAO_SOCIAL_LOGIN_CLIENT_ID=' backend/.env.$APP_ENV | cut -d= -f2)
              [ -n "$KAKAO_ID" ] && echo "NEXT_PUBLIC_KAKAO_CLIENT_ID=$KAKAO_ID" >> .env
            fi

            # 빌드 + 재시작 한 줄 (worker 제외)
            APP_ENV=$APP_ENV docker compose -f docker-compose.prod.yml up -d --build --force-recreate frontend backend nginx redis

            # worker 최초 생성만
            APP_ENV=$APP_ENV docker compose -f docker-compose.prod.yml up -d --no-recreate worker

            # backend 준비 대기 후 마이그레이션 + 정적 파일
            until APP_ENV=$APP_ENV docker compose -f docker-compose.prod.yml exec -T backend python -c "import django" 2>/dev/null; do
              sleep 2
            done
            APP_ENV=$APP_ENV docker compose -f docker-compose.prod.yml exec -T backend python manage.py migrate --noinput
            APP_ENV=$APP_ENV docker compose -f docker-compose.prod.yml exec -T backend python manage.py collectstatic --noinput
            echo "✅ Deploy complete: $APP_ENV"
