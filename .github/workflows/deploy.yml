name: Deploy

on:
  push:
    branches:
      - main   # prod 배포
      - dev    # dev 배포

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment variables
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "EC2_HOST=${{ secrets.PROD_EC2_HOST }}" >> $GITHUB_ENV
            echo "APP_ENV=prod" >> $GITHUB_ENV
          else
            echo "EC2_HOST=${{ secrets.DEV_EC2_HOST }}" >> $GITHUB_ENV
            echo "APP_ENV=dev" >> $GITHUB_ENV
          fi

      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "."
          target: "~/mpz_app"
          rm: false

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: APP_ENV
          command_timeout: 20m
          script: |
            cd ~/mpz_app

            # Docker Compose가 자동으로 읽는 .env 파일 생성 (NEXT_PUBLIC_* 빌드 변수 포함)
            echo "APP_ENV=$APP_ENV" > .env
            grep '^NEXT_PUBLIC_' backend/.env.$APP_ENV >> .env || true

            # NEXT_PUBLIC_KAKAO_CLIENT_ID 추가 (backend에선 KAKAO_SOCIAL_LOGIN_CLIENT_ID로 저장)
            if ! grep -q 'NEXT_PUBLIC_KAKAO_CLIENT_ID' .env; then
              KAKAO_ID=$(grep '^KAKAO_SOCIAL_LOGIN_CLIENT_ID=' backend/.env.$APP_ENV | cut -d= -f2)
              [ -n "$KAKAO_ID" ] && echo "NEXT_PUBLIC_KAKAO_CLIENT_ID=$KAKAO_ID" >> .env
            fi

            # 빌드 + 재시작 (worker 제외)
            APP_ENV=$APP_ENV docker compose -f docker-compose.prod.yml up -d --build frontend backend nginx redis

            # worker는 최초 생성만 (기존 컨테이너 재시작 안 함)
            APP_ENV=$APP_ENV docker compose -f docker-compose.prod.yml up -d --no-recreate worker

            APP_ENV=$APP_ENV docker compose -f docker-compose.prod.yml exec -T backend python manage.py migrate --noinput
            APP_ENV=$APP_ENV docker compose -f docker-compose.prod.yml exec -T backend python manage.py collectstatic --noinput --clear
            echo "✅ Deploy complete: $APP_ENV (worker 유지)"
