version: "3.3"
services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}
    command: ["node", "server.js"]
    networks:
      - network
    restart: always
    environment:
      - NODE_ENV=production

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["bash", "./paracord_runner.sh"]
    env_file:
      - ./backend/.env.${APP_ENV:-prod}
    networks:
      - network
    depends_on:
      - redis
    restart: always

  redis:
    image: redis:7-alpine
    networks:
      - network
    volumes:
      - redis_data:/data
    restart: always

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    networks:
      - network
    volumes:
      - ./nginx/${APP_ENV:-prod}.conf:/etc/nginx/conf.d/default.conf
      - ./backend/local-cdn:/app/backend/local-cdn
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
    restart: always

networks:
  network:

volumes:
  redis_data:
