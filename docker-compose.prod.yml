services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}
        - NEXT_PUBLIC_KAKAO_CLIENT_ID=${NEXT_PUBLIC_KAKAO_CLIENT_ID}
        - CACHE_BUST=${CACHE_BUST}
    command: ["node", "server.js"]
    networks:
      - network
    restart: always
    environment:
      - NODE_ENV=production
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "awslogs"
      options:
        awslogs-region: "ap-northeast-2"
        awslogs-group: "/mpz/${APP_ENV:-prod}"
        awslogs-stream: "frontend"
        awslogs-create-group: "true"

  # 강아지학교 프론트엔드 (school.mpz.kr / dev-school.mpz.kr)
  # 이미지는 doggy-school 리포의 deploy.yml이 GHCR에 push → SSH 단계에서
  # `docker pull ... && docker tag ... mpz_app-school-frontend:latest` 후 `up --no-build` 로 갱신
  school-frontend:
    image: mpz_app-school-frontend:latest
    command: ["node", "server.js"]
    env_file:
      - ./school/.env.${APP_ENV:-prod}
    networks:
      - network
    restart: always
    environment:
      - NODE_ENV=production
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "awslogs"
      options:
        awslogs-region: "ap-northeast-2"
        awslogs-group: "/mpz/${APP_ENV:-prod}"
        awslogs-stream: "school-frontend"
        awslogs-create-group: "true"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["bash", "./paracord_runner.sh"]
    env_file:
      - ./backend/.env.${APP_ENV:-prod}
    networks:
      - network
    depends_on:
      - redis
    volumes:
      - static_files:/backend/local-cdn
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1536M
    logging:
      driver: "awslogs"
      options:
        awslogs-region: "ap-northeast-2"
        awslogs-group: "/mpz/${APP_ENV:-prod}"
        awslogs-stream: "backend"
        awslogs-create-group: "true"

  worker:
    # backend와 동일한 이미지를 명시적으로 사용 — deploy.yml의 GHCR pull + retag로 backend 이미지가 갱신되면 worker도 자동 반영
    # (이전 구조: build만 정의 → up --no-build 시 옛 mpz_app-worker:latest 이미지가 그대로 재사용되어 코드 갱신 누락됨)
    image: mpz_app-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["bash", "./worker_entrypoint.sh"]
    env_file:
      - ./backend/.env.${APP_ENV:-prod}
    networks:
      - network
    depends_on:
      - redis
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "awslogs"
      options:
        awslogs-region: "ap-northeast-2"
        awslogs-group: "/mpz/${APP_ENV:-prod}"
        awslogs-stream: "worker"
        awslogs-create-group: "true"

  redis:
    image: redis:7-alpine
    networks:
      - network
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "awslogs"
      options:
        awslogs-region: "ap-northeast-2"
        awslogs-group: "/mpz/${APP_ENV:-prod}"
        awslogs-stream: "redis"
        awslogs-create-group: "true"

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    networks:
      - network
    volumes:
      - ./nginx/${APP_ENV:-prod}.conf:/etc/nginx/conf.d/default.conf
      - static_files:/app/backend/local-cdn
      - /etc/letsencrypt:/etc/letsencrypt:ro
    # school-frontend은 doggy-school 리포의 deploy.yml이 별도 관리하므로
    # depends_on에 포함하지 않는다 — 포함 시 mpz_app의 nginx 재시작이
    # school-frontend 이미지 부재 시 실패할 수 있음. nginx upstream의
    # `resolver 127.0.0.11`이 컨테이너 기동 후 동적으로 해석한다.
    depends_on:
      - frontend
      - backend
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: "awslogs"
      options:
        awslogs-region: "ap-northeast-2"
        awslogs-group: "/mpz/${APP_ENV:-prod}"
        awslogs-stream: "nginx"
        awslogs-create-group: "true"

networks:
  network:

volumes:
  redis_data:
  static_files:
