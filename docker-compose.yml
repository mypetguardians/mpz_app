version: "3.3"
services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    networks:
      - network
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    networks:
      - network
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    networks:
      - network
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend

networks:
  network:
