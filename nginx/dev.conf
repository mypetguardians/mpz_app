# gzip 압축
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_comp_level 5;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

# 보안 헤더
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-XSS-Protection "1; mode=block" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name dev.mpz.kr dev-api.mpz.kr dev-school.mpz.kr;
    return 301 https://$host$request_uri;
}

# Frontend (dev.mpz.kr)
server {
    listen 443 ssl http2;
    server_name dev.mpz.kr;

    ssl_certificate /etc/letsencrypt/live/dev.mpz.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.mpz.kr/privkey.pem;

    # Docker DNS resolver (컨테이너 IP 변경 대응)
    resolver 127.0.0.11 valid=10s;
    set $frontend_upstream http://frontend:3000;

    # 정적 파일 (해시 포함) - 장기 캐시
    location /_next/static/ {
        proxy_pass $frontend_upstream;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /_next/ {
        proxy_pass $frontend_upstream;
    }

    # HTML - 캐시 금지 (배포 즉시 반영)
    location / {
        proxy_pass $frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}

# 강아지학교 Frontend (dev-school.mpz.kr)
server {
    listen 443 ssl http2;
    server_name dev-school.mpz.kr;

    ssl_certificate /etc/letsencrypt/live/dev-school.mpz.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev-school.mpz.kr/privkey.pem;

    # Docker DNS resolver (컨테이너 IP 변경 대응)
    resolver 127.0.0.11 valid=10s;
    set $school_upstream http://school-frontend:3000;

    # 정적 파일 (해시 포함) - 장기 캐시
    location /_next/static/ {
        proxy_pass $school_upstream;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /_next/ {
        proxy_pass $school_upstream;
    }

    # HTML / API Routes / Server Actions - 캐시 금지
    location / {
        proxy_pass $school_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 강아지학교는 Server Actions로 이미지 업로드까지 받으므로 클라이언트 바디 한도 확장
        client_max_body_size 25M;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}

# Backend (dev-api.mpz.kr)
server {
    listen 443 ssl http2;
    server_name dev-api.mpz.kr;

    ssl_certificate /etc/letsencrypt/live/dev.mpz.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.mpz.kr/privkey.pem;

    client_max_body_size 10M;

    # Docker DNS resolver (컨테이너 IP 변경 대응)
    resolver 127.0.0.11 valid=10s;
    set $backend_upstream http://backend:8000;

    # API
    location / {
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket
    location /ws/ {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # Django 정적 파일
    location /static/ {
        alias /app/backend/local-cdn/;
    }
}
