# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name dev.mpz.kr dev-api.mpz.kr;
    return 301 https://$host$request_uri;
}

# Frontend (dev.mpz.kr)
server {
    listen 443 ssl;
    server_name dev.mpz.kr;

    ssl_certificate /etc/letsencrypt/live/dev.mpz.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.mpz.kr/privkey.pem;

    # 정적 파일 (해시 포함) - 장기 캐시
    location /_next/static/ {
        proxy_pass http://frontend:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /_next/ {
        proxy_pass http://frontend:3000;
    }

    # HTML - 캐시 금지 (배포 즉시 반영)
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}

# Backend (dev-api.mpz.kr)
server {
    listen 443 ssl;
    server_name dev-api.mpz.kr;

    ssl_certificate /etc/letsencrypt/live/dev.mpz.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.mpz.kr/privkey.pem;

    client_max_body_size 10M;

    # API
    location / {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # Django 정적 파일
    location /static/ {
        alias /app/backend/local-cdn/;
    }
}
